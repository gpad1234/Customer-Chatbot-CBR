<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customer Support Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chat-container {
    width: 100%;
    max-width: 700px;
    height: 92vh;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-header .avatar {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .chat-header .info h2 { font-size: 16px; font-weight: 600; }
  .chat-header .info p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .ai-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    display: flex; align-items: center; gap: 5px;
  }
  .ai-dot { width: 7px; height: 7px; border-radius: 50%; background: #69ff8a; }

  /* Hints bar */
  .hints-bar {
    background: #f8f9ff;
    border-bottom: 1px solid #e8eaf0;
    padding: 10px 16px;
    flex-shrink: 0;
  }
  .hints-bar p {
    font-size: 11px;
    color: #888;
    margin-bottom: 8px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .hints-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .hints-scroll::-webkit-scrollbar { display: none; }
  .hint-chip {
    white-space: nowrap;
    background: #fff;
    border: 1.5px solid #c5cae9;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    color: #3949ab;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .hint-chip:hover { background: #e8eaf6; border-color: #7986cb; }
  .hint-chip:active { background: #c5cae9; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg { display: flex; gap: 10px; align-items: flex-end; max-width: 88%; }
  .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot   { align-self: flex-start; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .msg.bot  .msg-avatar { background: #e8eaf6; }
  .msg.user .msg-avatar { background: #1a73e8; color: #fff; }

  .msg-body { display: flex; flex-direction: column; gap: 4px; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg.bot  .bubble {
    background: #f1f3f4;
    color: #202124;
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: #1a73e8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-meta {
    font-size: 11px;
    color: #999;
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 0 4px;
  }
  .msg.user .msg-meta { justify-content: flex-end; }
  .intent-badge {
    background: #e8f0fe;
    color: #1a73e8;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .score-badge {
    background: #e6f4ea;
    color: #137333;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
  }

  /* Typing indicator */
  .typing { align-self: flex-start; display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .typing .dots { display: flex; gap: 4px; }
  .typing .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #bbb;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    border-top: 1px solid #e8eaf0;
    padding: 14px 16px;
    background: #fff;
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    border: 1.5px solid #dadce0;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #1a73e8; }
  textarea::placeholder { color: #aaa; }

  .send-btn {
    width: 44px; height: 44px;
    background: #1a73e8;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover  { background: #1557b0; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn svg { fill: #fff; width: 20px; height: 20px; }
  .send-btn:disabled { background: #dadce0; cursor: not-allowed; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .ai-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #666;
    cursor: pointer;
    user-select: none;
  }
  /* Toggle switch */
  .toggle-switch {
    position: relative; width: 32px; height: 18px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #ccc; border-radius: 18px;
    transition: background 0.2s;
    cursor: pointer;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    left: 2px; top: 2px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: #1a73e8; }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(14px); }

  .char-count { font-size: 11px; color: #bbb; }

  /* Welcome splash */
  .welcome {
    text-align: center;
    color: #888;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .welcome .icon { font-size: 48px; }
  .welcome h3 { font-size: 17px; color: #444; font-weight: 600; }
  .welcome p  { font-size: 13px; max-width: 320px; line-height: 1.6; }
</style>
</head>
<body>
<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🎧</div>
    <div class="info">
      <h2>Support Assistant</h2>
      <p>Case-Based Reasoning · Powered by CBR + AI</p>
    </div>
    <div class="ai-badge"><div class="ai-dot"></div>Online</div>
    <a href="/ontology" target="_blank" style="margin-left:10px;color:rgba(255,255,255,0.85);text-decoration:none;font-size:12px;border:1px solid rgba(255,255,255,0.4);border-radius:20px;padding:4px 12px;white-space:nowrap" title="View domain ontology diagram">🧠 Ontology</a>
  </div>

  <!-- Prompt hints -->
  <div class="hints-bar">
    <p>Suggested topics</p>
    <div class="hints-scroll" id="hints"></div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">💬</div>
      <h3>How can we help you today?</h3>
      <p>Describe your issue below or tap a suggestion above. We'll find the best solution from our knowledge base.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Describe your issue…" maxlength="500"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-footer">
      <label class="ai-toggle">
        <div class="toggle-switch">
          <input type="checkbox" id="aiToggle" checked/>
          <span class="toggle-slider"></span>
        </div>
        ✨ AI-enhanced reply
      </label>
      <span class="char-count" id="charCount">0 / 500</span>
    </div>
  </div>
</div>

<script>
const HINTS = [
  { label: "Cancel my order",            text: "I want to cancel my order" },
  { label: "Track my delivery",           text: "Where is my order? I want to track my delivery" },
  { label: "Request a refund",            text: "I'd like to request a refund for my purchase" },
  { label: "Payment issue",               text: "I'm having a problem with my payment" },
  { label: "Wrong item received",         text: "I received the wrong item in my order" },
  { label: "Change shipping address",     text: "I need to change my shipping address" },
  { label: "Account login problem",       text: "I cannot log into my account" },
  { label: "Update account details",      text: "I need to update my account information" },
  { label: "Check invoice",               text: "I need a copy of my invoice" },
  { label: "Cancellation fee",            text: "What is the cancellation fee for my order?" },
  { label: "Newsletter unsubscribe",      text: "I want to unsubscribe from the newsletter" },
  { label: "Leave a complaint",           text: "I want to raise a complaint about my experience" },
];

// Render hints
const hintsEl = document.getElementById("hints");
HINTS.forEach(h => {
  const chip = document.createElement("button");
  chip.className = "hint-chip";
  chip.textContent = h.label;
  chip.onclick = () => {
    inputEl.value = h.text;
    updateCharCount();
    inputEl.focus();
    autoResize();
  };
  hintsEl.appendChild(chip);
});

const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("input");
const sendBtn    = document.getElementById("sendBtn");
const aiToggle   = document.getElementById("aiToggle");
const charCount  = document.getElementById("charCount");

function updateCharCount() {
  charCount.textContent = `${inputEl.value.length} / 500`;
}
function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
}
inputEl.addEventListener("input", () => { updateCharCount(); autoResize(); });
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, text, meta = null) {
  // Remove welcome splash on first message
  const splash = messagesEl.querySelector(".welcome");
  if (splash) splash.remove();

  const msg = document.createElement("div");
  msg.className = `msg ${role}`;

  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = role === "user" ? "👤" : "🎧";

  const body = document.createElement("div");
  body.className = "msg-body";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  body.appendChild(bubble);

  if (meta) {
    const metaEl = document.createElement("div");
    metaEl.className = "msg-meta";
    if (meta.intent) {
      const badge = document.createElement("span");
      badge.className = "intent-badge";
      badge.textContent = meta.intent.replace(/_/g, " ");
      metaEl.appendChild(badge);
    }
    if (meta.score != null) {
      const score = document.createElement("span");
      score.className = "score-badge";
      score.textContent = `${Math.round(meta.score * 100)}% match`;
      metaEl.appendChild(score);
    }
    if (meta.source) {
      const src = document.createElement("span");
      src.textContent = meta.source;
      metaEl.appendChild(src);
    }
    body.appendChild(metaEl);
  }

  msg.appendChild(avatar);
  msg.appendChild(body);
  messagesEl.appendChild(msg);
  scrollToBottom();
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "typing";
  el.id = "typing";
  el.innerHTML = `
    <div class="msg-avatar" style="background:#e8eaf6;font-size:14px">🎧</div>
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  messagesEl.appendChild(el);
  scrollToBottom();
}
function removeTyping() {
  document.getElementById("typing")?.remove();
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage("user", text);
  inputEl.value = "";
  updateCharCount();
  autoResize();
  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch("/chat-query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        problem: text,
        top_k: 3,
        use_ai: aiToggle.checked,
      }),
    });
    const data = await res.json();
    removeTyping();

    const meta = {
      intent: data.intent,
      score: data.similarity_score,
      source: data.ai_enhanced ? "✨ AI-enhanced" : "📚 CBR",
    };
    addMessage("bot", data.answer, meta);
  } catch (err) {
    removeTyping();
    addMessage("bot", "Sorry, something went wrong. Please try again.", null);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener("click", send);
</script>
</body>
</html>
